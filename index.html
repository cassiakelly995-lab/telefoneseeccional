<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Painel de Contatos — OAB Santana de Parnaíba</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#08090d;
  --surface:#0e1018;
  --surface2:#131620;
  --line:rgba(255,255,255,.06);
  --line2:rgba(255,255,255,.1);

  --gold:#c9a84c;
  --gold2:#e2c47a;
  --gold3:#f0d89a;
  --gold-dim:rgba(201,168,76,.08);
  --gold-glow:rgba(201,168,76,.14);

  --text:#e8e4dc;
  --text-mid:#8a8070;
  --text-dim:#3d3830;

  --green:#4caf7d;
  --green-bg:rgba(76,175,125,.09);

  --ff:'DM Sans',sans-serif;
  --serif:'Cormorant Garamond',serif;
  --r:8px;
}

html,body{
  min-height:100%;
  font-family:var(--ff);
  background:var(--bg);
  color:var(--text);
  font-size:13px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ── TOPO ── */
.topo{
  position:sticky;top:0;z-index:100;
  background:rgba(8,9,13,.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line2);
  padding:0 16px;
  height:52px;
  display:flex;align-items:center;gap:12px;
}
.topo-marca{
  font-family:var(--serif);font-size:15px;font-weight:500;
  color:var(--gold2);letter-spacing:.2px;flex:1;
  line-height:1.2;
}
.topo-marca small{
  display:block;font-size:10px;font-weight:400;font-style:italic;
  color:var(--text-mid);letter-spacing:.5px;font-family:var(--ff);
  margin-top:1px;
}
.topo-relogio{
  font-family:'DM Sans',monospace;font-size:11px;
  color:var(--text-dim);font-variant-numeric:tabular-nums;
  flex-shrink:0;
}

/* ── BUSCA ── */
.busca-wrap{
  padding:12px 16px 10px;
  position:sticky;top:52px;z-index:99;
  background:var(--bg);
  border-bottom:1px solid var(--line);
}
.busca-inner{
  position:relative;max-width:600px;
}
.busca-inner input{
  width:100%;
  background:var(--surface);
  border:1px solid var(--line2);
  border-radius:6px;
  padding:9px 14px 9px 36px;
  font-family:var(--ff);font-size:13px;
  color:var(--text);outline:none;
  transition:border-color .15s;
  letter-spacing:.1px;
}
.busca-inner input::placeholder{color:var(--text-dim)}
.busca-inner input:focus{border-color:rgba(201,168,76,.3)}
.busca-icon{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;pointer-events:none;
  stroke:var(--text-dim);stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round;
}

/* ── STATS ── */
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;
  background:var(--line);
  border-bottom:1px solid var(--line);
  margin-bottom:0;
}
.stat{
  background:var(--bg);
  padding:12px 10px;
  text-align:center;
}
.stat-n{
  font-family:var(--serif);font-size:22px;font-weight:600;
  color:var(--gold2);line-height:1;
}
.stat-l{
  font-size:9px;color:var(--text-dim);
  letter-spacing:.8px;text-transform:uppercase;
  margin-top:3px;
}

/* ── FILTROS ── */
.filtros{
  display:flex;gap:4px;
  padding:10px 16px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  border-bottom:1px solid var(--line);
}
.filtros::-webkit-scrollbar{display:none}
.flt{
  padding:5px 12px;
  border-radius:4px;
  border:1px solid var(--line);
  background:transparent;
  font-family:var(--ff);font-size:11.5px;
  color:var(--text-mid);
  cursor:pointer;white-space:nowrap;
  transition:all .12s;
  flex-shrink:0;
}
.flt:hover{border-color:var(--line2);color:var(--text)}
.flt.on{
  background:var(--gold-dim);
  border-color:rgba(201,168,76,.3);
  color:var(--gold2);
}

/* ── CORPO ── */
.corpo{
  max-width:700px;
  padding:0 0 60px;
}

/* Secao */
.secao-titulo{
  padding:16px 16px 6px;
  display:flex;align-items:center;gap:8px;
}
.secao-txt{
  font-family:var(--serif);font-size:11px;font-style:italic;
  color:var(--text-dim);letter-spacing:.8px;text-transform:uppercase;
  white-space:nowrap;
}
.secao-linha{flex:1;height:1px;background:var(--line)}

/* Card */
.card{
  border-bottom:1px solid var(--line);
  position:relative;
}
.card:last-child{border-bottom:none}

/* Card header — clicável */
.c-btn{
  width:100%;
  display:flex;align-items:center;
  padding:11px 16px;
  gap:10px;
  background:transparent;
  border:none;cursor:pointer;
  text-align:left;
  transition:background .1s;
  position:relative;
}
.c-btn:active{background:rgba(255,255,255,.02)}
.card.feat .c-btn{background:rgba(201,168,76,.03)}
.card.feat .c-btn:active{background:var(--gold-dim)}

.c-ico{
  font-size:15px;flex-shrink:0;
  width:28px;text-align:center;
}
.c-nome{
  font-size:13px;font-weight:500;
  color:var(--text);flex:1;
  line-height:1.2;text-align:left;
}
.card.feat .c-nome{color:var(--gold3)}

.c-meta{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.c-qtd{
  font-size:10px;color:var(--text-dim);
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:10px;
  padding:2px 7px;
  font-variant-numeric:tabular-nums;
}
.c-wpp{
  font-size:9px;font-weight:600;letter-spacing:.4px;
  color:var(--green);
  background:var(--green-bg);
  border:1px solid rgba(76,175,125,.15);
  border-radius:10px;
  padding:2px 7px;
}
.c-chevron{
  width:14px;height:14px;flex-shrink:0;
  stroke:var(--text-dim);stroke-width:1.5;fill:none;
  stroke-linecap:round;stroke-linejoin:round;
  transition:transform .2s;
  margin-left:2px;
}
.card.open .c-chevron{transform:rotate(180deg)}

/* Accordion body */
.c-body{
  display:none;
  border-top:1px solid var(--line);
  background:var(--surface);
}
.card.open .c-body{display:block}

/* Número row */
.n-row{
  display:flex;align-items:center;
  padding:8px 16px;
  gap:8px;
  border-bottom:1px solid var(--line);
}
.n-row:last-child{border-bottom:none}
.n-row:hover{background:rgba(255,255,255,.015)}

.n-num{
  font-family:'DM Sans',monospace;
  font-size:13px;color:var(--text);
  font-variant-numeric:tabular-nums;
  flex:1;letter-spacing:.2px;
}
.card.feat .n-num{
  color:var(--gold2);font-weight:500;
  font-size:14px;
}

.n-acts{display:flex;gap:4px;flex-shrink:0}

.btn{
  display:flex;align-items:center;gap:3px;
  padding:5px 9px;
  border-radius:4px;
  border:1px solid var(--line2);
  background:transparent;
  font-family:var(--ff);font-size:11px;font-weight:400;
  color:var(--text-mid);
  cursor:pointer;text-decoration:none;
  transition:all .12s;
  white-space:nowrap;
  flex-shrink:0;
}
.btn svg{
  width:10px;height:10px;
  stroke:currentColor;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round;
}
.btn:hover{
  border-color:rgba(201,168,76,.3);
  color:var(--gold2);
  background:var(--gold-dim);
}
.btn-wpp{
  color:var(--green);
  border-color:rgba(76,175,125,.2);
  background:var(--green-bg);
}
.btn-wpp:hover{
  background:rgba(76,175,125,.15);
  border-color:rgba(76,175,125,.4);
}
.btn-ok{
  color:var(--gold);
  border-color:rgba(201,168,76,.3);
  background:var(--gold-dim);
}

/* Empty */
.vazio{
  padding:40px 16px;text-align:center;
  color:var(--text-dim);font-size:13px;
}

/* Toast */
.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--surface2);
  border:1px solid rgba(201,168,76,.25);
  padding:8px 16px;border-radius:6px;
  font-size:12px;color:var(--text-mid);
  opacity:0;transition:all .18s;
  pointer-events:none;z-index:999;
  white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:11px;height:11px;stroke:var(--gold);stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>

   UTILS
════════════════════════════ */
function tel(n){var c=n.replace(/\D/g,'');return 'tel:+'+(c.length<=11?'55'+c:c);}
function wpp(n){var c=n.replace(/\D/g,'');return 'https://wa.me/'+(c.length<=11?'55'+c:c);}
function allCards(){return SEC.reduce(function(a,s){return a.concat(s.cards);},[])}

/* ════════════════════════════
   STATS
════════════════════════════ */
function buildStats(){
  var cards=allCards();
  var totalP=cards.reduce(function(a,c){return a+c.phones.length;},0);
  var wppC=cards.reduce(function(a,c){return a+c.phones.filter(function(p){return p.wpp;}).length;},0);
  var d=[
    {n:SEC.length,l:'Categorias'},
    {n:cards.length,l:'Setores'},
    {n:totalP,l:'Telefones'},
    {n:wppC,l:'WhatsApp'}
  ];
  document.getElementById('stats').innerHTML=d.map(function(s){
    return '<div class="stat"><div class="stat-n">'+s.n+'</div><div class="stat-l">'+s.l+'</div></div>';
  }).join('');
}

/* ════════════════════════════
   FILTROS
════════════════════════════ */
var filtroAtivo='all';
function buildFiltros(){
  var opts=[{k:'all',l:'Todos'}]
    .concat(SEC.map(function(s){return {k:s.label,l:s.label};}))
    .concat([{k:'wpp',l:'WhatsApp'}]);
  document.getElementById('filtros').innerHTML=opts.map(function(o){
    return '<button class="flt'+(filtroAtivo===o.k?' on':'')+'" onclick="setFiltro(\''+o.k.replace(/'/g,"\\'")+'\')">'+o.l+'</button>';
  }).join('');
}
function setFiltro(f){filtroAtivo=f;buildFiltros();render();}

/* ════════════════════════════
   RENDER
════════════════════════════ */
/* estado aberto */
var abertos={};

function toggle(id){
  abertos[id]=!abertos[id];
  render();
}

function render(){
  var q=(document.getElementById('busca').value||'').toLowerCase().trim();
  var out=document.getElementById('corpo');
  var html='';var total=0;
  var hasQ=!!q;

  SEC.forEach(function(sec){
    var cards=sec.cards.filter(function(card){
      if(filtroAtivo==='wpp'){if(!card.phones.some(function(p){return p.wpp;})) return false;}
      else if(filtroAtivo!=='all'&&filtroAtivo!==sec.label) return false;
      if(!q) return true;
      if(card.name.toLowerCase().indexOf(q)>=0) return true;
      return card.phones.some(function(p){return p.num.toLowerCase().indexOf(q)>=0;});
    });
    if(!cards.length) return;
    total+=cards.length;

    html+='<div class="secao-titulo">'
      +'<div class="secao-txt">'+sec.label+'</div>'
      +'<div class="secao-linha"></div>'
      +'</div>';

    cards.forEach(function(card){
      var isOpen=!!(abertos[card.id]||(hasQ&&card.phones.some(function(p){return p.num.toLowerCase().indexOf(q)>=0;})));
      var f=card.feat;
      var wppCount=card.phones.filter(function(p){return p.wpp;}).length;

      html+='<div class="card'+(f?' feat':'')+(isOpen?' open':'')+'" id="wrap_'+card.id+'">';

      /* header */
      html+='<button class="c-btn" onclick="toggle(\''+card.id+'\')">'
        +'<span class="c-ico">'+card.icon+'</span>'
        +'<span class="c-nome">'+card.name+'</span>'
        +'<span class="c-meta">';
      if(card.phones.length>1) html+='<span class="c-qtd">'+card.phones.length+'</span>';
      if(wppCount) html+='<span class="c-wpp">WA</span>';
      html+='</span>'
        +'<svg class="c-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>'
        +'</button>';

      /* body */
      html+='<div class="c-body">';
      var phones=filtroAtivo==='wpp'?card.phones.filter(function(p){return p.wpp;}):card.phones;
      phones.forEach(function(p,i){
        var bid='btn_'+card.id+'_'+i;
        html+='<div class="n-row">'
          +'<span class="n-num">'+p.num+'</span>'
          +'<div class="n-acts">';
        if(p.wpp){
          html+='<a href="'+wpp(p.num)+'" class="btn btn-wpp" target="_blank">'
            +'<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>WA</a>';
        }
        html+='<a href="'+tel(p.num)+'" class="btn">'
          +'<svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.38 2 2 0 0 1 3.62 1.2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l1.71-1.71a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Ligar</a>';
        html+='<button class="btn" id="'+bid+'" onclick="copiar(\''+bid+'\',\''+p.num.replace(/'/g,"\\'")+'\')">Copiar</button>';
        html+='</div></div>';
      });
      html+='</div>';
      html+='</div>';
    });
  });

  if(!total) html='<div class="vazio">Nenhum resultado para "'+q+'"</div>';
  out.innerHTML=html;
}

/* ════════════════════════════
   TOGGLE via estado persistido
════════════════════════════ */
function toggle(id){
  abertos[id]=!abertos[id];
  render();
}

/* ════════════════════════════
   COPIAR
════════════════════════════ */
var _t;
function copiar(id,num){
  navigator.clipboard.writeText(num).then(function(){
    var b=document.getElementById(id);
    if(b){b.classList.add('btn-ok');b.textContent='✓';
      setTimeout(function(){b.classList.remove('btn-ok');b.textContent='Copiar';},1500);}
    document.getElementById('toast-msg').textContent='Copiado: '+num;
    var el=document.getElementById('toast');
    el.classList.add('show');
    clearTimeout(_t);
    _t=setTimeout(function(){el.classList.remove('show');},2000);
  });
}

/* ════════════════════════════
   RELÓGIO
════════════════════════════ */
function tick(){
  var n=new Date();
  document.getElementById('clock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
setInterval(tick,10000);tick();

/* INIT */
buildStats();buildFiltros();render();
</script>
</body>
</html>
